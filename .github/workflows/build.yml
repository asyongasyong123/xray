name: Build & Push Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # Siguroa nga mao ni ang eksaktong ngalan sa imong Secrets sa GitHub
          username: ${{ secrets.DOCKER_HUB_USERNAME6 }}
          password: ${{ secrets.DOCKER_HUB_TOKEN6 }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: jthandg/xray-con:latest
          platforms: linux/amd64
          cache-from: type=registry,ref=jthandg/xray-con:buildcache
          cache-to: type=registry,ref=jthandg/xray-con:buildcache,mode=max
